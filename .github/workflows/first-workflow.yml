# ==============================================================================
# GITHUB ACTIONS WORKFLOW FILE
# ==============================================================================
# This file defines an automated CI/CD pipeline using GitHub Actions.
#
# --- WHAT IS CI/CD? ---
# CI (Continuous Integration): Automatically build and test code every time 
#   you push changes to the repository. Catches bugs early.
# CD (Continuous Deployment/Delivery): Automatically deploy code to an 
#   environment (staging/production) after tests pass.
#
# --- KEY CONCEPTS ---
# 1. Workflow: A automated process defined in YAML
# 2. Trigger: What event causes the workflow to run (push, PR, manual)
# 3. Job: A set of steps that run on the same runner
# 4. Step: Individual tasks (actions or shell commands)
# 5. Runner: A server that executes your workflow (GitHub provides ubuntu-latest)
# ==============================================================================

# This is a basic workflow to help you get started with Actions

name: Continuous Integration

# Controls when the workflow will run
# "on" defines the TRIGGERS - events that start this workflow
on:
  # Trigger on push to main branch (e.g., when you push code)
  push:
    branches: [ "main" ]

  # Trigger on pull request to main branch (when opening a PR)
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  # This is useful for testing or manual deployments
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
# JOBS: Each job runs on a separate virtual machine (runner)

# jobs:
#   test:
#     runs-on: ubuntu-latest
#     steps:
#       - run: echo "Running tests"

#   deploy:
#     needs: test
#     runs-on: ubuntu-latest
#     steps:
#       - run: echo "Deploying"


jobs:
  test1:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Test 1"

  test2:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Test 2"

  test3:
    needs: [test1, test2]
    runs-on: ubuntu-latest
    steps:
      - run: echo "Test 3 (runs after test1 and test2)"
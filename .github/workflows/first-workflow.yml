# ==============================================================================
# GITHUB ACTIONS WORKFLOW FILE
# ==============================================================================
# This file defines an automated CI/CD pipeline using GitHub Actions.
#
# --- WHAT IS CI/CD? ---
# CI (Continuous Integration): Automatically build and test code every time 
#   you push changes to the repository. Catches bugs early.
# CD (Continuous Deployment/Delivery): Automatically deploy code to an 
#   environment (staging/production) after tests pass.
#
# --- KEY CONCEPTS ---
# 1. Workflow: A automated process defined in YAML
# 2. Trigger: What event causes the workflow to run (push, PR, manual)
# 3. Job: A set of steps that run on the same runner
# 4. Step: Individual tasks (actions or shell commands)
# 5. Runner: A server that executes your workflow (GitHub provides ubuntu-latest)
# ==============================================================================

# This is a basic workflow to help you get started with Actions

name: Continuous Integration

# Controls when the workflow will run
# "on" defines the TRIGGERS - events that start this workflow
on: [push, pull_request, workflow_dispatch]


# A workflow run is made up of one or more jobs that can run sequentially or in parallel
# JOBS: Each job runs on a separate virtual machine (runner)

jobs:
  # Job 1: LINT - Check code quality (runs first)
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install flake8 linter
        run: pip install flake8
      - name: Run flake8 linter
        # Checks all .py files in the repository
        run: flake8 . --count --select=E9,F63,F7,W --show-source --statistics

  # Job 2: Build
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "Building..."

  # Job 3: Test (runs AFTER lint passes)
  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Run tests
        run: echo "Running tests..."

  # Job 4: Deploy (runs AFTER build AND test complete)
  deploy:
    needs: [build, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "Deploying..."
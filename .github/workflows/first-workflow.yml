# ==============================================================================
# CI/CD WORKFLOW FOR LEARNING
# ==============================================================================
# FLOW: Push Code → Lint → Build → Test → Deploy
# ==============================================================================

name: Continuous Integration

# Triggers: When this workflow runs
on: [push, pull_request, workflow_dispatch]


jobs:
  # ========== STAGE 1: LINT ==========
  # Purpose: Check code quality/style (PEP 8)
  # Fails if: Code has formatting/style issues
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install flake8
      - run: flake8 src/ tests/ --max-line-length=100

  # ========== STAGE 2: BUILD ==========
  # Purpose: Prepare code for testing
  # Runs: In parallel with LINT
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "✓ Build successful"

  # ========== STAGE 3: TEST ==========
  # Purpose: Run all pytest tests
  # Runs: AFTER lint passes
  # Fails if: Any test fails
  test:
    needs: [lint, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install -r requirements.txt
      - run: PYTHONPATH=src pytest tests/ -v

  # ========== STAGE 4: DEPLOY ==========
  # Purpose: Deploy the site if all tests pass
  # Runs: AFTER build AND test complete
  deploy:
    needs: [build, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Deploy docs to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: docs
          clean: true
          commit-message: "Deploy first workflow page"